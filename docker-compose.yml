services:
  api:
    build:
      context: .
      target: production
    container_name: ilu-api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ilu}:${POSTGRES_PASSWORD:-ilu}@db:5432/${POSTGRES_DB:-ilu_db}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: ilu-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ilu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ilu}
      POSTGRES_DB: ${POSTGRES_DB:-ilu_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ilu} -d ${POSTGRES_DB:-ilu_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  uploads:
